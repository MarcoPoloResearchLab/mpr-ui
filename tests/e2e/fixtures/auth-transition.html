<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MPR Header Auth Transition Fixture</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.css"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: #e2e8f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      main {
        padding: 7rem 1.5rem 3rem;
      }
    </style>
    <script>
      window.__authTransitionProfile = {
        display: 'Annie Easley',
        given_name: 'Annie',
        avatar_url: 'https://cdn.example.com/annie.png',
        user_email: 'annie@example.com',
      };
      window.__authTransitionResolveExchange = null;
      window.initAuthClient = function initAuthClient() {
        return Promise.resolve();
      };
      window.getCurrentUser = function getCurrentUser() {
        return Promise.resolve(null);
      };
      window.setAuthTenantId = function setAuthTenantId(tenantId) {
        window.__authTransitionTenantId = tenantId;
      };
      window.exchangeGoogleCredential = function exchangeGoogleCredential() {
        return new Promise(function waitForExchange(resolve) {
          window.__authTransitionResolveExchange = resolve;
        });
      };
      window.releaseAuthTransitionProfile = function releaseAuthTransitionProfile() {
        if (typeof window.__authTransitionResolveExchange === 'function') {
          window.__authTransitionResolveExchange(window.__authTransitionProfile);
          window.__authTransitionResolveExchange = null;
        }
      };
    </script>
  </head>
  <body>
    <mpr-header
      id="fixture-header"
      brand-label="Transition Fixture"
      brand-href="/"
      auth-transition='{
        "title": "Opening workspace",
        "message": "Loading your authenticated app surface.",
        "completionEvent": "fixture:app-ready"
      }'
      google-site-id="fixture-site"
      tauth-url="http://localhost:8080"
      tauth-login-path="/auth/google"
      tauth-logout-path="/auth/logout"
      tauth-nonce-path="/auth/nonce"
      tauth-tenant-id="tenant-fixture"
      logout-url="/"
    ></mpr-header>

    <main>
      <h1>Authenticated App Shell</h1>
      <p>Dispatch <code>fixture:app-ready</code> after the protected surface is ready.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.js"></script>
  </body>
</html>
