<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer Flex Utility Fixture</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/module.esm.js"
      type="module"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/gh/MarcoPoloResearchLab/mpr-ui@latest/mpr-ui.js"
    ></script>
  </head>
  <body class="d-flex flex-column min-vh-100 bg-body-tertiary">
    <main class="container py-4" data-test="content">
      <h1 class="h4 mb-2">Footer flex utility fixture</h1>
      <p class="mb-0">
        Short content should leave the remaining viewport height above the footer when
        <code>base-class</code> includes <code>mt-auto</code>.
      </p>
    </main>

    <mpr-footer
      id="page-footer"
      sticky="false"
      base-class="mpr-footer mt-auto"
      prefix-text="Built by"
      privacy-link-label="Privacy"
      privacy-link-href="/privacy"
      links-collection='{
        "style": "drop-up",
        "text": "Explore",
        "links": [{"label": "Docs", "url": "#docs"}]
      }'
    ></mpr-footer>
  </body>
</html>
